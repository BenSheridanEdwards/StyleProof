name: 'styleproof report'
description: >-
  Diff styleproof captures against a committed baseline. When styles
  changed, commit a compact side-by-side report to an orphan branch and post it
  to the PR — inline images for public repos, a link for private repos (where a
  committed file's images render through the viewer's authenticated session).
branding:
  icon: 'layers'
  color: 'blue'

inputs:
  baseline-dir:
    description: 'Directory with the committed baseline captures (.json.gz + .png).'
    required: true
  fresh-dir:
    description: 'Directory with the freshly captured maps to compare (.json.gz + .png).'
    required: true
  report-branch:
    description: 'Orphan branch that stores reports (created on first run). One pr-<n>/ folder per PR; never pruned.'
    default: 'styleproof-reports'
  github-token:
    description: 'Token used to push the report branch and post the PR comment.'
    default: ${{ github.token }}
  fail-on-diff:
    description: 'Legacy refactor-certification mode: fail the job when any difference is found. Ignored when require-approval is true.'
    default: 'true'
  require-approval:
    description: >-
      Review-gate mode. Instead of failing the job, set a `StyleProof` commit
      status (red until a write-access reviewer ticks the approval box in the
      report comment, green when there are no visual changes). Pair with the
      styleproof-approve workflow (see README) and a branch-protection rule that
      requires the `StyleProof` status.
    default: 'false'
  status-context:
    description: 'Name of the commit status set in review-gate mode (must match the approve workflow + branch protection).'
    default: 'StyleProof'

outputs:
  changed:
    description: >-
      "true" when an existing surface changed (computed style, pseudo-element, DOM,
      or state). A brand-new surface with no baseline is NOT a change and leaves
      this "false" — it's reported for reference but never gates.
    value: ${{ steps.diff.outputs.changed }}
  report-url:
    description: 'Blob URL of the committed report (when changed).'
    value: ${{ steps.publish.outputs.url }}

runs:
  using: composite
  steps:
    # Resolve the PR number + head SHA from the TRUSTED event payload. This is what
    # lets the report be driven from a `workflow_run` (the fork/Dependabot-safe flow:
    # capture under the read-only `pull_request` token, then comment + set the status
    # here under a write token) as well as directly from `pull_request`.
    #
    # Identity is taken only from data GitHub sets — never from the (untrusted)
    # capture artifact — so a fork can't spoof which PR/commit the privileged status
    # lands on. `workflow_run.head_sha` is the real captured commit; the PR is its
    # `pull_requests` association (same-repo, incl. Dependabot) or, for forks, the
    # open PR whose head IS that exact commit.
    - id: context
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          let prNumber;
          let headSha;
          if (context.eventName === 'pull_request') {
            prNumber = context.payload.pull_request.number;
            headSha = context.payload.pull_request.head.sha;
          } else if (context.eventName === 'workflow_run') {
            const run = context.payload.workflow_run;
            headSha = run.head_sha;
            if (run.pull_requests && run.pull_requests.length) {
              prNumber = run.pull_requests[0].number;
            } else {
              const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                ...context.repo,
                commit_sha: headSha,
              });
              const pr = data.find((p) => p.state === 'open' && p.head.sha === headSha);
              prNumber = pr && pr.number;
            }
          }
          // Emit both together or neither, so a later step can never run with one half.
          const resolved = Boolean(prNumber) && Boolean(headSha);
          core.setOutput('pr-number', resolved ? String(prNumber) : '');
          core.setOutput('head-sha', resolved ? headSha : '');
          if (!resolved) {
            core.info('StyleProof: no PR context resolved — comment/status steps will be skipped.');
          }

    # Policy config: an optional styleproof.config.json at the consumer repo root.
    # Today it carries one setting — `blocking` — but it's the home for future gate
    # policy. Absent/unreadable → all defaults (non-blocking). Inputs stay the home
    # for plumbing (dirs, token, mode); the config file is the home for policy.
    - id: config
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const file = path.join(process.env.GITHUB_WORKSPACE || '.', 'styleproof.config.json');
          let cfg = {};
          try {
            cfg = JSON.parse(fs.readFileSync(file, 'utf8'));
            core.info(`StyleProof: loaded ${file}`);
          } catch (e) {
            if (e.code !== 'ENOENT') core.warning(`StyleProof: ignoring unreadable styleproof.config.json — ${e.message}`);
          }
          core.setOutput('blocking', cfg.blocking === true ? 'true' : 'false');

    - id: diff
      shell: bash
      run: |
        set +e
        npx styleproof-diff "${{ inputs.baseline-dir }}" "${{ inputs.fresh-dir }}" --max=200 | tee styleproof-diff.txt
        code=${PIPESTATUS[0]}
        set -e
        if [ "$code" -eq 2 ]; then echo "styleproof-diff usage/capture error" >&2; exit 2; fi
        # 1 = reviewable changes (gate on these); 3 = only NEW surfaces with no
        # baseline (report them, but they never gate). `report` fires for either,
        # so the report is published/posted; `changed` drives the review gate.
        if [ "$code" -eq 1 ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
        if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then echo "report=true" >> "$GITHUB_OUTPUT"; else echo "report=false" >> "$GITHUB_OUTPUT"; fi

    # Is THIS commit's diff already signed off? Read the existing review status so a
    # re-run after approval keeps the check green (and renders the box ticked) instead
    # of clobbering the approval the approve workflow set. Only meaningful when changed.
    - id: gate
      if: steps.context.outputs.pr-number != '' && inputs.require-approval == 'true'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const sha = '${{ steps.context.outputs.head-sha }}';
          const STATUS = '${{ inputs.status-context }}';
          let approved = false;
          if (changed) {
            const { data } = await github.rest.repos.listCommitStatusesForRef({ ...context.repo, ref: sha, per_page: 100 });
            const mine = data.find((s) => s.context === STATUS);
            approved = !!mine && mine.state === 'success';
          }
          core.setOutput('approved', approved ? 'true' : 'false');

    # Report images use RELATIVE paths so they render from the committed file (do
    # NOT pass --image-base-url — a raw.githubusercontent URL is fetched anonymously
    # by GitHub's Camo proxy and 404s on private repos).
    - id: publish
      if: steps.diff.outputs.report == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        npx styleproof-report "${{ inputs.baseline-dir }}" "${{ inputs.fresh-dir }}" --out styleproof-report || true

        REPO='${{ github.repository }}'
        BRANCH='${{ inputs.report-branch }}'
        PR='${{ steps.context.outputs.pr-number }}'
        REPORT_PATH="pr-${PR:-${{ github.run_id }}}"
        REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

        # Concurrency-safe by re-deriving from the CURRENT remote tip each retry:
        # clone the branch fresh (or init an orphan on the very first run), apply
        # ONLY this PR's pr-<n>/ folder, commit, push. Different PRs touch
        # different folders, so a rejected push just means another job advanced
        # the branch — start over from its new tip. No rebase, so no
        # unrelated-histories trap on a first-run race.
        REPORT_MSG="StyleProof report ${REPORT_PATH} @ ${{ github.sha }}"
        ok=
        for i in 1 2 3 4 5; do
          TMP="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$REMOTE" "$BRANCH" >/dev/null 2>&1; then
            git clone -q --depth 1 --branch "$BRANCH" "$REMOTE" "$TMP"
          else
            git -C "$TMP" init -q -b "$BRANCH"           # first run: a clean orphan
            git -C "$TMP" remote add origin "$REMOTE"
          fi
          git -C "$TMP" config user.name 'github-actions[bot]'
          git -C "$TMP" config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          [ -f "$TMP/README.md" ] || printf '# StyleProof reports\n\nMachine-generated by [styleproof](https://github.com/BenSheridanEdwards/StyleProof).\nEach `pr-<n>/` holds the latest visual-diff report for that PR — open `report.md` to see the before/after crops.\n' > "$TMP/README.md"

          rm -rf "${TMP:?}/${REPORT_PATH}"
          mkdir -p "$TMP/$REPORT_PATH/crops"
          cp styleproof-report/report.md "$TMP/$REPORT_PATH/report.md"
          # Composite (before|after) crops for changes, plus single-side crops for
          # new surfaces — both are referenced by report.md's relative image links.
          cp styleproof-report/crops/*-composite.png styleproof-report/crops/*-annotated.png styleproof-report/crops/*-new.png "$TMP/$REPORT_PATH/crops/" 2>/dev/null || true

          git -C "$TMP" add -A
          git -C "$TMP" commit -q -m "$REPORT_MSG" || true
          if git -C "$TMP" push -q origin "HEAD:$BRANCH"; then ok=1; rm -rf "$TMP"; break; fi
          rm -rf "$TMP"
          sleep $((i * 2))
        done
        [ -n "$ok" ] || { echo "could not push report branch after retries" >&2; exit 1; }

        echo "url=https://github.com/${REPO}/blob/${BRANCH}/${REPORT_PATH}/report.md" >> "$GITHUB_OUTPUT"
        echo "raw-base=https://raw.githubusercontent.com/${REPO}/${BRANCH}/${REPORT_PATH}" >> "$GITHUB_OUTPUT"

    - name: Upsert PR comment
      if: steps.context.outputs.pr-number != ''
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const prNumber = Number('${{ steps.context.outputs.pr-number }}');
          const marker = '<!-- styleproof-report -->';
          // `changed` = reviewable before/after differences (these gate). `report`
          // also covers NEW surfaces with no baseline: still worth posting (with a
          // screenshot), but they never gate — so a new-surfaces-only run posts the
          // report yet leaves the check green.
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const report = '${{ steps.diff.outputs.report }}' === 'true';
          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo, issue_number: prNumber, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          const upsert = (body) => existing
            ? github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body })
            : github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });

          if (!report) {
            if (existing) await upsert(`${marker}\n## 🗺️ StyleProof report\n\n✓ All surfaces identical: every computed style, pseudo-element, and hover/focus/active state matches.`);
            return;
          }

          const url = '${{ steps.publish.outputs.url }}';

          // The committed report is the COMPLETE source of truth — side-by-side crops
          // plus per-element property tables. The comment stays lean: the summary, one
          // approval box, and a link. It never duplicates the report (so the two can't
          // drift), and renders identically on public and private repos.
          const reportMd = fs.existsSync('styleproof-report/report.md') ? fs.readFileSync('styleproof-report/report.md', 'utf8') : '';
          const lines = reportMd.split('\n');
          const headEnd = lines.findIndex((l) => l.startsWith('### '));
          const summary = headEnd > 0 ? lines.slice(0, headEnd).join('\n').trim() : '## 🗺️ StyleProof report';

          const requireApproval = '${{ inputs.require-approval }}' === 'true';
          const approved = '${{ steps.gate.outputs.approved }}' === 'true';
          const statusContext = '${{ inputs.status-context }}';
          // Bind approval to this exact commit so a post-report push can't inherit green.
          const headSha = '${{ steps.context.outputs.head-sha }}';

          const link = `### 📊 [**View the side-by-side visual report →**](${url})`;
          // One box signs off every change. Pre-ticked on a re-run that's already
          // approved, so the rendered state matches the (green) commit status.
          const box = requireApproval && changed ? ['', `- [${approved ? 'x' : ' '}] **Approve all changes**`] : [];
          const footer = requireApproval
            ? [
                '---',
                changed
                  ? `_Tick **Approve all changes** to turn the **${statusContext}** check green — write access required, one tick signs off everything. A new push that changes styles re-opens it._`
                  : `_The surface(s) are **new** — no baseline to compare, so they don't block the **${statusContext}** check (it stays green). They become the baseline once this merges._`,
                `<!-- styleproof-sha:${headSha} -->`,
              ]
            : ['---', '_To accept: regenerate the committed baseline from this build and commit it with your diff._'];

          const body = [marker, summary, ...box, '', link, '', ...footer].join('\n');
          await upsert(body);

    # Review-gate mode: drive a commit status the approve workflow can flip,
    # instead of failing the job. Green when nothing changed; red ("needs
    # sign-off") until a write-access reviewer ticks the box. PR events only.
    - name: Set review status
      if: steps.context.outputs.pr-number != '' && inputs.require-approval == 'true'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const approved = '${{ steps.gate.outputs.approved }}' === 'true';
          const sha = '${{ steps.context.outputs.head-sha }}';
          const url = '${{ steps.publish.outputs.url }}';
          // Green when nothing changed OR a prior sign-off already approved this commit
          // (so re-running the report can't clobber an approval the approve workflow set).
          const green = !changed || approved;
          await github.rest.repos.createCommitStatus({
            ...context.repo,
            sha,
            context: '${{ inputs.status-context }}',
            state: green ? 'success' : 'failure',
            description: !changed ? 'No visual changes' : approved ? 'Visual changes approved' : 'Visual changes need sign-off — tick the box in the report comment',
            ...(changed && !approved && url ? { target_url: url } : {}),
          });

    # blocking (styleproof.config.json: "blocking": true): on UNAPPROVED visual changes,
    # fail the job so the check is red even on a repo without a branch-protection rule
    # requiring the status. Async by design — sign off in the comment, then re-run this
    # job; the re-run sees the approval (via the gate step) and passes. Review-gate only.
    - name: Block on unapproved changes
      if: >-
        steps.context.outputs.pr-number != '' &&
        inputs.require-approval == 'true' &&
        steps.config.outputs.blocking == 'true' &&
        steps.diff.outputs.changed == 'true' &&
        steps.gate.outputs.approved != 'true'
      shell: bash
      run: |
        echo "StyleProof: unapproved visual changes — tick 'Approve all changes' in the report comment, then re-run this job to clear the check." >&2
        exit 1

    # Legacy refactor-certification: fail the job on any diff (default). Skipped
    # in review-gate mode, where the status check is the gate instead. Uses
    # `report` (not `changed`) so a new surface with no baseline also fails the
    # certification — "nothing changed" means the capture set didn't grow either.
    - name: Fail on diff
      if: steps.diff.outputs.report == 'true' && inputs.fail-on-diff == 'true' && inputs.require-approval != 'true'
      shell: bash
      run: |
        echo 'Style changes detected — review the PR comment. To accept, regenerate the baseline and commit it.' >&2
        exit 1
