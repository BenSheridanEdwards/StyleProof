name: 'styleproof report'
description: >-
  Diff two StyleProof capture directories, publish a compact side-by-side report
  to an orphan branch, and post it to the PR — inline images for public repos, a
  link for private repos (where a committed file's images render through the
  viewer's authenticated session).
branding:
  icon: 'layers'
  color: 'blue'

inputs:
  baseline-dir:
    description: 'Directory with restored or freshly captured base-branch maps (.json.gz + .png).'
    required: true
  fresh-dir:
    description: 'Directory with restored or freshly captured PR-head maps to compare (.json.gz + .png).'
    required: true
  base-capture-failed:
    description: 'Set true when the baseline capture failed with zero maps and baseline-dir is intentionally bare. Partial baselines with tolerated per-surface failures keep this false. Produces DEGRADED_BASELINE when true.'
    default: 'false'
  report-branch:
    description: 'Orphan branch that stores reports (created on first run). One pr-<n>/ folder per PR; the styleproof-init workflow prunes each on PR close.'
    default: 'styleproof-reports'
  github-token:
    description: 'Token used to push the report branch and post the PR comment.'
    default: ${{ github.token }}
  fail-on-diff:
    description: 'Certify mode: fail the job when any difference is found. Ignored when require-approval is true.'
    default: 'true'
  require-approval:
    description: >-
      Review-gate mode. Instead of failing the job, set a `StyleProof` commit
      status (red until a write-access reviewer ticks the approval box in the
      report comment, green when there are no visual changes). Pair with the
      styleproof-approve workflow (see README) and a branch-protection rule that
      requires the `StyleProof` status.
    default: 'false'
  status-context:
    description: 'Name of the commit status set in review-gate mode (must match the approve workflow + branch protection).'
    default: 'StyleProof'

outputs:
  changed:
    description: >-
      "true" when review is required: an existing surface changed (computed style,
      pseudo-element, DOM, or state), or a brand-new surface was captured with no
      baseline and must be approved before becoming part of the baseline.
    value: ${{ steps.diff.outputs.changed }}
  report-url:
    description: 'Blob URL of the durable report receipt for this run.'
    value: ${{ steps.publish.outputs.url }}
  trust-state:
    description: >-
      Machine-readable terminal classification: NO_VISUAL_CHANGES,
      VISUAL_APPROVAL_REQUIRED, DATA_RESIDUE_UNACKNOWLEDGED,
      INVENTORY_REMOVAL_UNACKNOWLEDGED, CERTIFICATION_FAILED,
      PARTIAL_BASELINE, DEGRADED_BASELINE, or REPORT_PUBLICATION_FAILED.
    value: ${{ steps.trust.outputs.state }}
  data-residue-keys:
    description: 'JSON array of unacknowledged <surface>·<endpoint> residue keys.'
    value: ${{ steps.verdict.outputs.data-residue-keys }}

runs:
  using: composite
  steps:
    # Composite actions run from a checked-out action ref, but bare `npx
    # styleproof-*` resolves from the consumer workspace or npm latest. Install and
    # build this action checkout, then run the checked-out bins so `uses: ...@v3`
    # truly executes v3 code even though `dist/` is not committed to git.
    - name: Install StyleProof action runtime
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm ci --ignore-scripts
        npm run build

    # Resolve the PR number + head SHA from the TRUSTED event payload. This is what
    # lets the report be driven from a `workflow_run` (the fork/Dependabot-safe flow:
    # capture under the read-only `pull_request` token, then comment + set the status
    # here under a write token) as well as directly from `pull_request`.
    #
    # Identity is taken only from data GitHub sets — never from the (untrusted)
    # capture artifact — so a fork can't spoof which PR/commit the privileged status
    # lands on. `workflow_run.head_sha` is the real captured commit; the PR is its
    # `pull_requests` association (same-repo, incl. Dependabot) or, for forks, the
    # open PR whose head IS that exact commit.
    - id: context
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        retries: 3
        script: |
          const { resolveActionContext } = await import(`${process.env.GITHUB_ACTION_PATH}/dist/action-context.js`);
          const { prNumber, headSha } = await resolveActionContext({
            eventName: context.eventName,
            payload: context.payload,
            repo: context.repo,
            github,
          });
          // Emit both together or neither, so a later step can never run with one half.
          const resolved = Boolean(prNumber) && Boolean(headSha);
          core.setOutput('pr-number', resolved ? prNumber : '');
          core.setOutput('head-sha', resolved ? headSha : '');
          if (!resolved) {
            core.info('StyleProof: no PR context resolved — comment/status steps will be skipped.');
          }

    # Policy config: an optional styleproof.config.json at the consumer repo root.
    # Today it carries one setting — `blocking` — but it's the home for future gate
    # policy. Absent → all defaults (blocking on; opt out with "blocking": false);
    # malformed policy fails loudly. Inputs stay the home for plumbing (dirs, token, mode);
    # the config file is the home for policy.
    - id: config
      uses: actions/github-script@v9
      with:
        script: |
          const { loadStyleProofConfig, STYLEPROOF_CONFIG_FILE } = await import(`${process.env.GITHUB_ACTION_PATH}/dist/config.js`);
          const root = process.env.GITHUB_WORKSPACE || '.';
          const cfg = loadStyleProofConfig(root);
          core.info(`StyleProof: loaded ${STYLEPROOF_CONFIG_FILE} policy (or defaults when absent)`);
          core.setOutput('blocking', cfg.blocking === false ? 'false' : 'true');
          // A removed navigable affordance (a route/tab/menu-item the UI stopped offering)
          // is a feature going unreachable — high-stakes, and NOT something the style
          // "approve all" box should wave through. It hard-fails unless the removal is
          // recorded in styleproof.inventory.json. On by default; set
          // "gateInventoryRemovals": false to opt out.
          core.setOutput('gate-inventory-removals', cfg.gateInventoryRemovals === false ? 'false' : 'true');

    - id: diff
      shell: bash
      run: |
        set +e
        node "$GITHUB_ACTION_PATH/bin/styleproof-diff.mjs" "${{ inputs.baseline-dir }}" "${{ inputs.fresh-dir }}" --max=200 --json styleproof-diff.json | tee styleproof-diff.txt
        code=${PIPESTATUS[0]}
        set -e
        if [ "$code" -eq 2 ]; then echo "styleproof-diff usage/capture error" >&2; exit 2; fi
        # Fail CLOSED on anything the contract doesn't define (a node crash, OOM kill,
        # SIGTERM, missing dist → 127/137/143/…): an undefined exit must never read as
        # "no visual changes" and set a green status.
        if [ "$code" -ne 0 ] && [ "$code" -ne 1 ] && [ "$code" -ne 3 ]; then
          echo "styleproof-diff exited with unexpected code $code — failing closed (this is a crash, not a verdict)" >&2
          exit "$code"
        fi
        # 1 = computed-style differences; 3 = only NEW surfaces with no baseline.
        # Both need human review in approval mode. Every defined verdict publishes a receipt.
        if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi

    # One machine-readable verdict for every defined diff. Consumers should not
    # re-parse styleproof-diff.json or guess whether approval can clear the run.
    - id: verdict
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const diff = JSON.parse(fs.readFileSync('styleproof-diff.json', 'utf8'));
          const residueKeys = (diff.dataResidue?.unacknowledged || []).map((entry) =>
            typeof entry === 'string' ? entry : entry.key,
          );
          const inventoryFailures =
            (diff.inventory?.unacknowledged || []).length +
            (diff.inventory?.staleAcknowledgements || []).length;
          const certificationFailed =
            diff.coverage?.basis === 'incomplete' ||
            diff.determinism?.status === 'unproven';
          // Raw certification deltas that cleanFindings strips entirely: the durable
          // report has no crops/sections. Never map this to visual approval.
          const rawOnlyNoReviewable =
            diff.reportConsistency?.ok === false ||
            diff.reportConsistency?.reason === 'raw_only_no_reviewable';
          const partialBaseline = (diff.partialBaseline === true) ||
            (Array.isArray(diff.explainedMissingBaselineSurfaces) &&
              diff.explainedMissingBaselineSurfaces.length > 0);
          let state = 'NO_VISUAL_CHANGES';
          if ((diff.dataResidue?.blocking ?? 0) > 0) state = 'DATA_RESIDUE_UNACKNOWLEDGED';
          else if (inventoryFailures > 0) state = 'INVENTORY_REMOVAL_UNACKNOWLEDGED';
          else if (certificationFailed || rawOnlyNoReviewable) state = 'CERTIFICATION_FAILED';
          else if (partialBaseline) state = 'PARTIAL_BASELINE';
          else if ('${{ inputs.base-capture-failed }}' === 'true') state = 'DEGRADED_BASELINE';
          else if ('${{ steps.diff.outputs.changed }}' === 'true') state = 'VISUAL_APPROVAL_REQUIRED';
          core.setOutput('state', state);
          core.setOutput('data-residue-keys', JSON.stringify(residueKeys));
          core.info(`StyleProof trust state: ${state}`);

    # Is THIS commit's diff already signed off? Read the existing review status so a
    # re-run after approval keeps the check green (and renders the box ticked) instead
    # of clobbering the approval the approve workflow set. Only meaningful when changed.
    - id: gate
      if: steps.context.outputs.pr-number != '' && inputs.require-approval == 'true'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        retries: 3
        script: |
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const sha = '${{ steps.context.outputs.head-sha }}';
          const STATUS = '${{ inputs.status-context }}';
          let approved = false;
          let approver = '';
          if (changed) {
            const { data } = await github.rest.repos.listCommitStatusesForRef({ ...context.repo, ref: sha, per_page: 100 });
            const mine = data.find((s) => s.context === STATUS);
            approved = !!mine && mine.state === 'success';
            // The approve workflow stamps "Approved by @x" into the status description,
            // so the comment can show who signed off even on a later report re-run.
            const m = approved && (mine.description || '').match(/Approved by @([A-Za-z0-9-]+)/);
            if (m) approver = m[1];
          }
          core.setOutput('approved', approved ? 'true' : 'false');
          core.setOutput('approver', approver);

    # Report images use RELATIVE paths so they render from the committed file (do
    # NOT pass --image-base-url — a raw.githubusercontent URL is fetched anonymously
    # by GitHub's Camo proxy and 404s on private repos).
    - id: publish
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        rm -rf styleproof-report
        set +e
        node "$GITHUB_ACTION_PATH/bin/styleproof-report.mjs" "${{ inputs.baseline-dir }}" "${{ inputs.fresh-dir }}" --out styleproof-report
        report_exit_code=$?
        set -e
        if [ "$report_exit_code" -ne 0 ] && [ "$report_exit_code" -ne 1 ]; then
          echo "styleproof-report exited with code $report_exit_code — no trustworthy report was generated" >&2
          exit "$report_exit_code"
        fi

        REPO='${{ github.repository }}'
        BRANCH='${{ inputs.report-branch }}'
        PR='${{ steps.context.outputs.pr-number }}'
        REPORT_PATH="pr-${PR:-${{ github.run_id }}}"
        REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

        # Concurrency-safe by re-deriving from the CURRENT remote tip each retry:
        # clone the branch fresh (or init an orphan on the very first run), apply
        # ONLY this PR's pr-<n>/ folder, commit, push. Different PRs touch
        # different folders, so a rejected push just means another job advanced
        # the branch — start over from its new tip. No rebase, so no
        # unrelated-histories trap on a first-run race.
        REPORT_SHA='${{ steps.context.outputs.head-sha }}'
        [ -n "$REPORT_SHA" ] || REPORT_SHA='${{ github.sha }}'
        REPORT_MSG="StyleProof report ${REPORT_PATH} @ ${REPORT_SHA}"
        ok=
        for i in 1 2 3 4 5; do
          TMP="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$REMOTE" "$BRANCH" >/dev/null 2>&1; then
            git clone -q --depth 1 --branch "$BRANCH" "$REMOTE" "$TMP"
          else
            git -C "$TMP" init -q -b "$BRANCH"           # first run: a clean orphan
            git -C "$TMP" remote add origin "$REMOTE"
          fi
          git -C "$TMP" config user.name 'github-actions[bot]'
          git -C "$TMP" config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          [ -f "$TMP/README.md" ] || printf '# StyleProof reports\n\nMachine-generated by [styleproof](https://github.com/BenSheridanEdwards/StyleProof).\nEach `pr-<n>/` holds the latest visual-diff report for that PR — open `report.md` to see the before/after crops.\n' > "$TMP/README.md"

          rm -rf "${TMP:?}/${REPORT_PATH}"
          mkdir -p "$TMP/$REPORT_PATH/crops"
          cp styleproof-report/report.md "$TMP/$REPORT_PATH/report.md"
          printf '\n<!-- styleproof-receipt head-sha:%s run-id:%s run-attempt:%s -->\n' \
            "$REPORT_SHA" '${{ github.run_id }}' '${{ github.run_attempt }}' \
            >> "$TMP/$REPORT_PATH/report.md"
          # Copy every generated crop referenced by report.md: composite,
          # annotated, zoom, content, and new-surface images.
          cp styleproof-report/crops/*.png "$TMP/$REPORT_PATH/crops/" 2>/dev/null || true

          git -C "$TMP" add -A
          git -C "$TMP" commit -q -m "$REPORT_MSG" || {
            git -C "$TMP" log -1 --format=%B | grep -Fqx "$REPORT_MSG" || {
              echo "report receipt did not create or match a current commit" >&2
              rm -rf "$TMP"
              exit 1
            }
          }
          if git -C "$TMP" push -q origin "HEAD:$BRANCH"; then
            REPORT_COMMIT="$(git -C "$TMP" rev-parse HEAD)"
            echo "sha=$REPORT_COMMIT" >> "$GITHUB_OUTPUT"
            ok=1
            rm -rf "$TMP"
            break
          fi
          rm -rf "$TMP"
          sleep $((i * 2))
        done
        [ -n "$ok" ] || { echo "could not push report branch after retries" >&2; exit 1; }

        [ -n "${REPORT_COMMIT:-}" ] || { echo "report branch push did not return a commit" >&2; exit 1; }

        # Publish isn't done until the consumer-visible artifact verifiably matches
        # THIS run: read the report back at the exact commit we are about to
        # advertise and require the receipt embedded above. Fail CLOSED — a green
        # run must never hand out a dead or stale report URL. Self-verifying here
        # replaces the read-back checks consumers otherwise bolt on after the action.
        EXPECTED_RECEIPT="styleproof-receipt head-sha:${REPORT_SHA} run-id:${{ github.run_id }} run-attempt:${{ github.run_attempt }}"
        verified=
        for i in 1 2 3 4 5; do
          published="$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github.raw' \
            "${GITHUB_API_URL:-https://api.github.com}/repos/${REPO}/contents/${REPORT_PATH}/report.md?ref=${REPORT_COMMIT}")" \
            && printf '%s' "$published" | grep -Fq "$EXPECTED_RECEIPT" && { verified=1; break; }
          sleep $((i * 2))
        done
        [ -n "$verified" ] || {
          echo "::error::StyleProof: the published report at ${REPORT_PATH} @ ${REPORT_COMMIT} is unreadable or its receipt does not match this run (${EXPECTED_RECEIPT}) — do not trust this run's report" >&2
          exit 1
        }
        echo "report receipt verified at ${REPORT_COMMIT}/${REPORT_PATH}"
        echo "url=https://github.com/${REPO}/blob/${REPORT_COMMIT}/${REPORT_PATH}/report.md" >> "$GITHUB_OUTPUT"
        echo "raw-base=https://raw.githubusercontent.com/${REPO}/${REPORT_COMMIT}/${REPORT_PATH}" >> "$GITHUB_OUTPUT"

    - name: Upsert PR comment
      if: steps.context.outputs.pr-number != ''
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        retries: 3
        script: |
          const fs = require('fs');
          const prNumber = Number('${{ steps.context.outputs.pr-number }}');
          const marker = '<!-- styleproof-report -->';
          // `changed` = review required: before/after differences OR new surfaces
          // with no baseline. Publication always supplies the durable receipt.
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo, issue_number: prNumber, per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          const upsert = (body) => existing
            ? github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body })
            : github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });

          const url = '${{ steps.publish.outputs.url }}';

          // The committed report is the COMPLETE source of truth — side-by-side crops
          // plus per-element property tables. The comment stays lean: the summary, one
          // approval box, and a link. It never duplicates the report (so the two can't
          // drift), and renders identically on public and private repos.
          const reportMd = fs.existsSync('styleproof-report/report.md') ? fs.readFileSync('styleproof-report/report.md', 'utf8') : '';
          const lines = reportMd.split('\n');
          const headEnd = lines.findIndex((l) => l.startsWith('### '));
          const summary = headEnd > 0 ? lines.slice(0, headEnd).join('\n').trim() : '## 🗺️ StyleProof report';

          const requireApproval = '${{ inputs.require-approval }}' === 'true';
          const approved = '${{ steps.gate.outputs.approved }}' === 'true';
          const approver = '${{ steps.gate.outputs.approver }}';
          const statusContext = '${{ inputs.status-context }}';
          const trustState = '${{ steps.verdict.outputs.state }}';
          // Bind approval to this exact commit so a post-report push can't inherit green.
          const headSha = '${{ steps.context.outputs.head-sha }}';

          const link = `### 📊 [**View the side-by-side visual report →**](${url})`;
          // One box signs off every change. On a re-run that's already approved it's
          // pre-ticked and carries "approved by @x" (reconstructed from the commit
          // status), so the comment matches the green status without re-running approval.
          const approvedBy = approved && approver ? ` — _approved by @${approver}_` : '';
          const box = requireApproval && trustState === 'VISUAL_APPROVAL_REQUIRED'
            ? ['', `- [${approved ? 'x' : ' '}] **Approve all changes**${approvedBy}`]
            : [];
          const trustGuidance = {
            DATA_RESIDUE_UNACKNOWLEDGED: '_Captured data fallbacks are unacknowledged — fix or fixture the endpoints; visual approval cannot clear this failure._',
            INVENTORY_REMOVAL_UNACKNOWLEDGED: '_A navigable affordance was removed without acknowledgement — repair or acknowledge it; visual approval cannot clear this failure._',
            CERTIFICATION_FAILED: '_Coverage, determinism, or report/diff consistency evidence is incomplete — repair the capture or reflow source; visual approval cannot clear this failure._',
            PARTIAL_BASELINE: '_Base capture is incomplete — repair baseline capture on the base branch; visual approval cannot clear missing baseline surfaces._',
            DEGRADED_BASELINE: '_The base capture failed, so this is a head-only receipt rather than a comparison — repair the base capture and rerun; visual approval cannot clear this failure._',
          }[trustState];
          const footer = [
            '---',
            trustGuidance || (requireApproval
              ? !changed
                ? `_No visual changes detected — the **${statusContext}** check is green._`
                : approved
                  ? `_Signed off — the **${statusContext}** check is green. A new push that changes styles or surfaces re-opens it._`
                  : `_Tick **Approve all changes** to turn the **${statusContext}** check green — write access required, one tick signs off every changed or new surface. A new push that changes styles or surfaces re-opens it._`
              : '_To accept: rebuild the map with `styleproof-map`, then rerun the report._'),
            ...(headSha ? [`<!-- styleproof-sha:${headSha} -->`] : []),
          ];

          const body = [marker, summary, ...box, '', link, '', ...footer].join('\n');
          await upsert(body);

    # Review-gate mode: drive a commit status the approve workflow can flip,
    # instead of failing the job. Green when nothing changed; red ("needs
    # sign-off") until a write-access reviewer ticks the box. PR events only.
    - name: Set review status
      if: steps.context.outputs.pr-number != '' && inputs.require-approval == 'true'
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        retries: 3
        script: |
          const changed = '${{ steps.diff.outputs.changed }}' === 'true';
          const approved = '${{ steps.gate.outputs.approved }}' === 'true';
          const trustState = '${{ steps.verdict.outputs.state }}';
          const sha = '${{ steps.context.outputs.head-sha }}';
          const url = '${{ steps.publish.outputs.url }}';
          // Green when no review is needed OR a prior sign-off already approved this commit
          // (so re-running the report can't clobber an approval the approve workflow set).
          const green =
            trustState === 'NO_VISUAL_CHANGES' ||
            (trustState === 'VISUAL_APPROVAL_REQUIRED' && approved);
          const descriptions = {
            NO_VISUAL_CHANGES: 'No visual changes',
            VISUAL_APPROVAL_REQUIRED: approved
              ? 'StyleProof changes approved'
              : 'StyleProof changes need sign-off — tick the box in the report comment',
            DATA_RESIDUE_UNACKNOWLEDGED: 'Data residue must be fixed or acknowledged — approval cannot clear it',
            INVENTORY_REMOVAL_UNACKNOWLEDGED: 'Navigable removal must be fixed or acknowledged',
            CERTIFICATION_FAILED: 'Coverage, determinism, or report/diff consistency evidence is incomplete',
            PARTIAL_BASELINE: 'Base capture incomplete — repair baseline on the base branch',
            DEGRADED_BASELINE: 'Base capture failed — head-only evidence cannot certify this change',
          };
          await github.rest.repos.createCommitStatus({
            ...context.repo,
            sha,
            context: '${{ inputs.status-context }}',
            state: green ? 'success' : 'failure',
            description: descriptions[trustState] || `StyleProof trust failure: ${trustState}`,
            ...(changed && !approved && url ? { target_url: url } : {}),
          });

    # A failed base capture still publishes useful head evidence, but that receipt
    # is not a comparison and must never become green through visual approval.
    - name: Block on degraded baseline
      if: inputs.base-capture-failed == 'true'
      shell: bash
      run: |
        echo 'StyleProof: base capture failed — the published report is head-only degraded evidence, not a base-vs-head certification. Repair the base capture and rerun.' >&2
        exit 1

    # Partial baseline bundles compare what they can, but ledger-explained missing
    # base surfaces are repair debt — not NO_VISUAL_CHANGES and not approvable.
    - name: Block on partial baseline
      if: steps.verdict.outputs.state == 'PARTIAL_BASELINE'
      shell: bash
      run: |
        echo 'StyleProof: base capture is incomplete — repair baseline capture on the base branch for the missing surfaces listed in the report (approval cannot clear this).' >&2
        exit 1

    # blocking (on by default; opt out with styleproof.config.json "blocking": false): on
    # UNAPPROVED changes/new surfaces, fail the job so the check is red even on a repo
    # without a branch-protection rule requiring the status. Async by design — sign off in
    # the comment, then re-run this job; the re-run sees the approval (via the gate step)
    # and passes. Review-gate only.
    - name: Block on unapproved changes
      if: >-
        steps.context.outputs.pr-number != '' &&
        inputs.require-approval == 'true' &&
        steps.config.outputs.blocking == 'true' &&
        steps.verdict.outputs.state == 'VISUAL_APPROVAL_REQUIRED' &&
        steps.gate.outputs.approved != 'true'
      shell: bash
      run: |
        echo "StyleProof: unapproved visual changes or new surfaces — tick 'Approve all changes' in the report comment, then re-run this job to clear the check." >&2
        exit 1

    # Certify mode: fail the job on any diff (default). Skipped
    # in review-gate mode, where the status check is the gate instead. New surfaces
    # set `changed`, so certification also fails when the capture set grows.
    - name: Fail on diff
      if: steps.diff.outputs.changed == 'true' && inputs.fail-on-diff == 'true' && inputs.require-approval != 'true'
      shell: bash
      run: |
        echo 'Style changes detected — review the PR comment. To accept, rebuild the map with styleproof-map and rerun the report.' >&2
        exit 1

    # Inventory hard-gate (runs LAST, in BOTH modes, after the report + comment publish so
    # a reviewer sees why): a removed navigable affordance — a route, tab, or menu item the
    # UI used to offer and HEAD no longer does — is a feature going unreachable. It is
    # categorically NOT a restyle to sign off on, so the style "approve all" box can't wave
    # it through; certify and review-gate mode alike fail hard on it UNLESS the removal is
    # acknowledged with a reason in styleproof.inventory.json. This is the source-of-truth
    # guarantee — a green never hides a feature that quietly disappeared. On by default;
    # opt out with "gateInventoryRemovals": false in styleproof.config.json.
    - name: Block on unacknowledged navigable removals
      if: steps.config.outputs.gate-inventory-removals != 'false'
      shell: bash
      run: |
        set -euo pipefail
        [ -f styleproof-diff.json ] || { echo "no styleproof-diff.json — nothing to gate"; exit 0; }
        # Armed but empty: the gate is on, yet neither map carried an inventory (j.inventory
        # is null), so there is nothing to gate on. Say so loudly instead of silently passing
        # green — a default capture spec must set `inventory: true` for this gate to have data.
        # A notice, never a failure: existing specs that opt out of capture must not break.
        if node -e "process.exit(require('./styleproof-diff.json').inventory == null ? 0 : 1)"; then
          echo "::notice::StyleProof: inventory gate is on but the captured maps carry no inventory — nothing to gate. Set \`inventory: true\` in your capture spec (styleproof-init scaffolds this) or opt out with \"gateInventoryRemovals\": false."
          exit 0
        fi
        # Unacknowledged removals AND stale acknowledgements both gate: a stale entry left
        # in styleproof.inventory.json pre-acknowledges the NEXT removal of that key.
        count="$(node -e "const j=require('./styleproof-diff.json'); const i=j.inventory||{}; process.stdout.write(String((i.unacknowledged||[]).length + (i.staleAcknowledgements||[]).length))")"
        if [ "${count:-0}" -gt 0 ]; then
          echo "::error::StyleProof: ${count} inventory gate failure(s) — removals without acknowledgement, or stale acknowledgements that must be pruned from styleproof.inventory.json."
          node -e "const j=require('./styleproof-diff.json'); const i=j.inventory||{}; for (const k of (i.unacknowledged||[])) console.log('  ✗ removed (unacknowledged): '+k); for (const k of (i.staleAcknowledgements||[])) console.log('  ✗ stale acknowledgement: '+k)"
          exit 1
        fi
        echo "✓ navigable inventory: no unacknowledged removals"

    # Provenance hard-gate (runs LAST, in BOTH modes, like the inventory gate): incomplete
    # coverage, an unproven-determinism capture, and an armed data-residue failure are
    # categorically NOT restyles — the style "approve all" box must not wave them through.
    # Each is a hole in what the green would certify, so they fail hard even after approval.
    - name: Block on unapprovable certification failures
      shell: bash
      run: |
        set -euo pipefail
        [ -f styleproof-diff.json ] || { echo "no styleproof-diff.json — nothing to gate"; exit 0; }
        fails="$(node -e "
          const j = require('./styleproof-diff.json');
          const out = [];
          if (j.coverage?.basis === 'incomplete') out.push('coverage incomplete: ' + (j.coverage.uncovered || []).join(', '));
          if (j.determinism?.status === 'unproven') out.push('determinism unproven (base ' + j.determinism.base + ', head ' + j.determinism.head + ')');
          if ((j.dataResidue?.blocking ?? 0) > 0) out.push('data-residue gate: ' + j.dataResidue.blocking + ' blocking failure(s)');
          if (j.reportConsistency && j.reportConsistency.ok === false) {
            out.push('report/diff consistency: ' + (j.reportConsistency.reason || 'raw_only_no_reviewable') + ' — certification deltas without reviewable report crops (not visual-approval)');
          }
          process.stdout.write(out.join('\\n'));
        ")"
        if [ -n "$fails" ]; then
          echo "::error::StyleProof: certification failure(s) that approval cannot wave through:"
          echo "$fails"
          exit 1
        fi
        echo "✓ certification: coverage, determinism, data-residue, and report consistency verdicts are approvable or clean"

    # Always expose a terminal trust classification, even when a later gate fails.
    # Publication failure outranks every diff verdict because reviewers have no
    # durable evidence to inspect in that state.
    - id: trust
      if: always()
      uses: actions/github-script@v9
      with:
        script: |
          const published = '${{ steps.publish.outcome }}' === 'success';
          const diffState = '${{ steps.verdict.outputs.state }}';
          const state = published ? (diffState || 'CERTIFICATION_FAILED') : 'REPORT_PUBLICATION_FAILED';
          core.setOutput('state', state);
          core.info(`StyleProof terminal trust state: ${state}`);
