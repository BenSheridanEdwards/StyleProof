name: Action dogfood

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: action-dogfood-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-dogfood:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: node scripts/action-dogfood-fixtures.mjs

      - id: clean
        uses: ./
        with:
          baseline-dir: action-dogfood/clean-base
          fresh-dir: action-dogfood/clean-head
          report-branch: styleproof-action-dogfood

      - name: Assert clean output
        run: |
          test '${{ steps.clean.outputs.changed }}' = 'false'
          test '${{ steps.clean.outputs.trust-state }}' = 'NO_VISUAL_CHANGES'
          test -n '${{ steps.clean.outputs.report-url }}'

      - id: changed
        uses: ./
        with:
          baseline-dir: action-dogfood/changed-base
          fresh-dir: action-dogfood/changed-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert changed output
        run: |
          test '${{ steps.changed.outputs.changed }}' = 'true'
          test '${{ steps.changed.outputs.trust-state }}' = 'VISUAL_APPROVAL_REQUIRED'
          test -n '${{ steps.changed.outputs.report-url }}'

      - id: new-surface
        uses: ./
        with:
          baseline-dir: action-dogfood/new-base
          fresh-dir: action-dogfood/new-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert new-surface-only output
        run: |
          test '${{ steps.new-surface.outputs.changed }}' = 'true'
          test '${{ steps.new-surface.outputs.trust-state }}' = 'VISUAL_APPROVAL_REQUIRED'
          test -n '${{ steps.new-surface.outputs.report-url }}'

      - id: partial-baseline
        continue-on-error: true
        uses: ./
        with:
          baseline-dir: action-dogfood/partial-base
          fresh-dir: action-dogfood/partial-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert partial baseline is repair debt, not visual approval
        run: |
          test '${{ steps.partial-baseline.outcome }}' = 'failure'
          test '${{ steps.partial-baseline.outputs.changed }}' = 'false'
          test '${{ steps.partial-baseline.outputs.trust-state }}' = 'PARTIAL_BASELINE'
          test -n '${{ steps.partial-baseline.outputs.report-url }}'

      - id: degraded
        continue-on-error: true
        uses: ./
        with:
          baseline-dir: action-dogfood/degraded-base
          fresh-dir: action-dogfood/degraded-head
          base-capture-failed: 'true'
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert a failed base capture produces degraded, failing evidence
        run: |
          test '${{ steps.degraded.outcome }}' = 'failure'
          test '${{ steps.degraded.outputs.changed }}' = 'true'
          test '${{ steps.degraded.outputs.trust-state }}' = 'DEGRADED_BASELINE'
          test -n '${{ steps.degraded.outputs.report-url }}'

      - id: residue
        continue-on-error: true
        uses: ./
        with:
          baseline-dir: action-dogfood/residue-base
          fresh-dir: action-dogfood/residue-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert unacknowledged data residue FAILS with a machine verdict
        run: |
          test '${{ steps.residue.outcome }}' = 'failure'
          test '${{ steps.residue.outputs.trust-state }}' = 'DATA_RESIDUE_UNACKNOWLEDGED'
          test '${{ steps.residue.outputs.data-residue-keys }}' = '["home·/api/status"]'

      - id: removed
        continue-on-error: true
        uses: ./
        with:
          baseline-dir: action-dogfood/removed-base
          fresh-dir: action-dogfood/removed-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert an unacknowledged navigable removal FAILS the action
        run: |
          # A dropped route/tab/menu-item must hard-fail even with fail-on-diff off — a
          # feature going unreachable is not a restyle for the "approve all" box to wave
          # through. On by default (styleproof.config.json: "gateInventoryRemovals": false
          # opts out).
          test '${{ steps.removed.outcome }}' = 'failure'
          test '${{ steps.removed.outputs.changed }}' = 'true'
          test '${{ steps.removed.outputs.trust-state }}' = 'INVENTORY_REMOVAL_UNACKNOWLEDGED'

      - id: certfail
        continue-on-error: true
        uses: ./
        with:
          baseline-dir: action-dogfood/certfail-base
          fresh-dir: action-dogfood/certfail-head
          report-branch: styleproof-action-dogfood
          fail-on-diff: 'false'

      - name: Assert unproven provenance certifies nothing and cannot be approved away
        run: |
          # Identical maps, but a side's determinism is unproven. This must NOT read as
          # NO_VISUAL_CHANGES: the run certifies nothing, and CERTIFICATION_FAILED is the
          # one state the approval box cannot clear. This is the exact state 4.6.2's
          # content-geometry bug hid in — undetected precisely because it was never
          # dogfooded here.
          test '${{ steps.certfail.outcome }}' = 'failure'
          test '${{ steps.certfail.outputs.trust-state }}' = 'CERTIFICATION_FAILED'

      - name: Assert PR report was published
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT_BRANCH: styleproof-action-dogfood
        run: |
          set -euo pipefail
          report_path="pr-${PR_NUMBER}/report.md"
          body="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --jq 'map(select(.body | contains("<!-- styleproof-report -->"))) | last | .body // ""')"
          printf '%s\n' "$body" | grep -F '<!-- styleproof-report -->'
          printf '%s\n' "$body" | grep -Eq "https://github.com/${GITHUB_REPOSITORY}/blob/[0-9a-f]{40}/${report_path}"

          for i in 1 2 3 4 5; do
            gh api "repos/${GITHUB_REPOSITORY}/contents/${report_path}?ref=${REPORT_BRANCH}" --jq .path | grep -Fx "$report_path" && exit 0
            sleep $((i * 2))
          done
          echo "StyleProof report file missing at ${REPORT_BRANCH}/${report_path}" >&2
          exit 1
