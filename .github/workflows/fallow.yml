name: Fallow

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # needed for comment/review-comments

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # best diff precision for --changed-since and hotspots
      # Build dist/ first so fallow can resolve the test suite's `../dist/*.js`
      # imports — tests run against the compiled output, so without a build those
      # imports read as "unresolved" (a false dead-code finding). dist is
      # .gitignored, so it's resolved-against but not itself analysed.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: fallow-rs/fallow@v3
        with:
          command: audit
          comment: true
          review-comments: true
      # Coverage-independent complexity gate (production mode → src/bin, skips tests).
      # Fails only on NEW functions over the cyclomatic/cognitive thresholds in
      # .fallowrc.jsonc, beyond the committed baseline.
      - name: Complexity gate
        uses: fallow-rs/fallow@v3
        with:
          command: health
          production: true
          baseline: .fallow/health-baseline.json
          fail-on-issues: true
