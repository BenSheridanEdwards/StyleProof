name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

# Read-only: gitleaks only reads the checked-out history.
permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      # Fail-closed: any leak (or a scan error) fails the job. GITLEAKS_ENABLE_*
      # telemetry is off; no license needed for a public repo.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
