name: CI

on:
  pull_request:
  push:
    branches: [main]

# Library CI only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      # ESLint 10's formatter uses newer Node APIs when printing findings. Keep
      # runtime support proven on every Node version, but run lint/format once on
      # the supported toolchain.
      - name: Lint
        if: matrix.node == '22'
        run: npm run lint

      - name: Format check
        if: matrix.node == '22'
        run: npm run format:check
      - name: Privacy check
        if: matrix.node == '22'
        run: npm run privacy:check

      # Fail the build on a known high/critical-severity vulnerability in the
      # dependency tree. Runs once on the supported toolchain, like lint/format.
      - name: Dependency audit
        if: matrix.node == '22'
        run: npm audit --audit-level=high

      # The committed demo report (docs/demo/) must match what the current report
      # renderer produces — so every PR shows the REAL report, never a stale one.
      # Deterministic synthetic inputs, so this is gate-safe on one Node version.
      - name: Demo report up to date
        if: matrix.node == '22'
        run: node scripts/demo-report.mjs --check

      - name: Unit tests
        run: npm test

      # The one place the browser capture path (page.evaluate + CDP) is
      # exercised — a self-contained file:// fixture, no live server. Runs on
      # ONE Node version: the suite exercises browser-evaluated code (Node-
      # agnostic); the Node-sensitive paths (CLI, fs, runner) are covered per
      # version by the unit suite above.
      - name: Cache Playwright browser
        if: matrix.node == '22'
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        if: matrix.node == '22'
        run: npx playwright install --with-deps chromium

      - name: Smoke e2e
        if: matrix.node == '22'
        run: npm run test:e2e

  cli-smoke:
    name: cli smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: node --test test/package-smoke.test.mjs
