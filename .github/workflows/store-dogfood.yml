name: Map store dogfood

# The end-to-end trust proof for the cache-first flow. Every other suite tests
# the links; this job runs the CHAIN, in anger, on every PR:
#
#   real browser capture of example/demo, bound to the REAL checked-out SHA
#     → published to a scratch map-store branch on the REAL GitHub remote
#       (auth, sparse clone, bot identity, retries — the production publish path)
#     → restored into a clean directory by that SHA + compatibility key
#     → certified byte-identical by styleproof-diff (exit 0)
#   plus the miss taxonomy: restoring an absent SHA must stay exit 4, never a
#   fake hit and never an infra-fault code.
#
# The scratch branch is unique per run and deleted afterwards, so the dogfood
# never pollutes the repo's actual styleproof-maps store.

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

concurrency:
  group: store-dogfood-${{ github.ref }}
  cancel-in-progress: true

jobs:
  round-trip:
    # Forks lack write permission for the scratch branch; same-repo PRs only.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      STYLEPROOF_CACHE_BRANCH: styleproof-maps-dogfood-${{ github.run_id }}
      MAP_ROOT: ${{ runner.temp }}/store-dogfood
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium

      - name: Capture the example app at the real head SHA and publish it
        run: |
          set -euo pipefail
          HEAD_SHA="$(git rev-parse HEAD)"
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
          PATH="$PWD/node_modules/.bin:$PATH" node bin/styleproof-map.mjs \
            --spec example/styleproof.spec.ts \
            --dir captured --base-dir "$MAP_ROOT" \
            --sha "$HEAD_SHA" --upload \
            -- --config example/store-dogfood.playwright.config.ts

      - name: Restore the published bundle into a clean directory
        run: |
          set -euo pipefail
          node bin/styleproof-map.mjs --restore --sha "$HEAD_SHA" \
            --dir restored --base-dir "$MAP_ROOT" \
            --spec example/styleproof.spec.ts

      - name: Certify restored == captured
        run: |
          set -euo pipefail
          node bin/styleproof-diff.mjs "$MAP_ROOT/captured" "$MAP_ROOT/restored"

      - name: A genuine miss stays exit 4 (never a fake hit, never an infra code)
        run: |
          set +e
          node bin/styleproof-map.mjs --restore --sha "0000000000000000000000000000000000000001" \
            --dir miss --base-dir "$MAP_ROOT" \
            --spec example/styleproof.spec.ts
          code=$?
          set -e
          if [ "$code" -ne 4 ]; then
            echo "::error::expected a genuine cache miss (exit 4), got exit $code" >&2
            exit 1
          fi

      - name: Delete the scratch store branch
        if: always()
        run: git push origin --delete "$STYLEPROOF_CACHE_BRANCH" || true
