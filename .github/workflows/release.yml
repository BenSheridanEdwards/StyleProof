name: Release

on:
  push:
    tags:
      # Full semver only. The moving major alias (e.g. v1) is updated BY this
      # workflow and is deliberately not a trigger, so there is no loop.
      - 'v[0-9]+.[0-9]+.[0-9]+'

# contents: write -> create the GitHub Release and move the major tag.
# id-token: write -> REQUIRED for `npm publish --provenance` (OIDC -> Sigstore).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest # styleproof is public, so GitHub-hosted runners are free
    steps:
      - uses: actions/checkout@v4

      # registry-url makes setup-node write an .npmrc that reads NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::pushed tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Idempotent and token-aware: skip when the version is already on npm
      # (a backfilled tag or a re-run) or when NPM_TOKEN is not configured
      # (keep publishing manually until then). Provenance needs npm >= 9.5
      # (Node 22 ships it) and id-token: write above; --access public is required.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::notice::NPM_TOKEN is not set — skipping npm publish. Publish manually, or add the secret for automated provenance-signed releases."
          elif npm view "styleproof@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::styleproof@${VERSION} is already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

      # Extract this tag's section from CHANGELOG.md if present; otherwise let
      # the release action auto-generate notes.
      - name: Build release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VERSION" '
              /^## / { if (p) exit; if (index($0, v)) { p=1; next } }
              p { print }
            ' CHANGELOG.md > notes.md
          fi
          if [ -s notes.md ]; then
            echo 'have_notes=true' >> "$GITHUB_OUTPUT"
          else
            echo 'have_notes=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && 'notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.have_notes != 'true' }}

      # Move the major alias (e.g. v1) to this release, so consumers pinning
      # `uses: BenSheridanEdwards/styleproof@v1` always get the latest 1.x. A
      # GITHUB_TOKEN push does not retrigger workflows, so this never loops.
      - name: Move the major tag
        run: |
          MAJOR="v$(node -p "require('./package.json').version.split('.')[0]")"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push -f origin "refs/tags/$MAJOR"
