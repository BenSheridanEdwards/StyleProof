name: Release

# Publish on merge to main. When a merged change bumps the version in
# package.json (i.e. there is no vX.Y.Z tag for it yet), this builds, tests,
# publishes to npm, tags the commit, cuts a GitHub Release from the CHANGELOG,
# moves the major alias (e.g. v3), and mirrors to GitHub Packages. A merge that
# does NOT bump the version is a clean no-op — npm forbids republishing a
# version, so the version bump is the deliberate "release this" signal.
#
# To cut a release: bump the version in your PR (`npm version patch|minor|major
# --no-git-tag-version`, or edit package.json + CHANGELOG), then merge. The
# npm package is the canonical artifact, so NPM_TOKEN must be configured before
# the workflow will tag or create a GitHub Release.
on:
  push:
    branches: [main]
  workflow_dispatch:

# contents: write -> tag + GitHub Release + move the major alias.
# id-token: write -> npm publish --provenance (OIDC -> Sigstore).
# packages: write -> the GitHub Packages mirror job.
permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest # styleproof is public, so GitHub-hosted runners are free
    outputs:
      released: ${{ steps.check.outputs.released }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need the tags to detect an existing release and to push a new one

      # registry-url makes setup-node write an .npmrc that reads NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # The version bump is the release signal: if package.json's version has no
      # tag yet, this merge bumped it and we release; otherwise it's a no-op.
      - name: Has this version been released?
        id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::notice::v$VERSION is already tagged — no version bump on this merge, nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::v$VERSION is new — releasing."
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.released == 'true'
        run: npm ci
      - name: Build
        if: steps.check.outputs.released == 'true'
        run: npm run build
      - name: Typecheck
        if: steps.check.outputs.released == 'true'
        run: npm run typecheck
      - name: Lint
        if: steps.check.outputs.released == 'true'
        run: npm run lint
      - name: Format check
        if: steps.check.outputs.released == 'true'
        run: npm run format:check
      - name: Privacy check
        if: steps.check.outputs.released == 'true'
        run: npm run privacy:check
      - name: Unit tests
        if: steps.check.outputs.released == 'true'
        run: npm test
      - name: Cache Playwright browser
        if: steps.check.outputs.released == 'true'
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium
        if: steps.check.outputs.released == 'true'
        run: npx playwright install --with-deps chromium
      - name: Smoke e2e
        if: steps.check.outputs.released == 'true'
        run: npm run test:e2e

      # Idempotent but strict: fail before tagging if NPM_TOKEN is unset, skip
      # publish when the version is already present, then verify the registry.
      # Provenance needs npm >= 9.5 (Node 22) and id-token: write.
      - name: Publish to npm
        if: steps.check.outputs.released == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN is not set — refusing to tag/release without publishing to npm."
            exit 1
          elif npm view "styleproof@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::styleproof@${VERSION} is already on npm — verifying."
          else
            # --ignore-scripts: prepublishOnly re-runs the ENTIRE validation
            # suite (clean+build+lint+format+privacy+unit+e2e) that this job
            # just ran step by step above — publishing the already-built,
            # already-validated dist/ directly halves the release wall time.
            # Local `npm publish` keeps the prepublishOnly safety net.
            npm publish --provenance --access public --ignore-scripts
          fi
          PUBLISHED=""
          for attempt in 1 2 3 4 5 6; do
            PUBLISHED="$(npm view "styleproof@${VERSION}" version 2>/dev/null || true)"
            if [ "$PUBLISHED" = "$VERSION" ]; then
              break
            fi
            echo "::notice::Waiting for styleproof@${VERSION} to propagate on npm (attempt ${attempt}/6)."
            sleep 10
          done
          if [ "$PUBLISHED" != "$VERSION" ]; then
            echo "::error::npm registry returned ${PUBLISHED:-<empty>} for styleproof@${VERSION}"
            exit 1
          fi
          echo "::notice::Verified styleproof@${VERSION} on npm."

      - name: Tag the release
        if: steps.check.outputs.released == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          git tag "v$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/v$VERSION"

      # Extract this version's section from CHANGELOG.md if present; otherwise let
      # the release action auto-generate notes.
      - name: Build release notes
        if: steps.check.outputs.released == 'true'
        id: notes
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VERSION" '
              /^## / { if (p) exit; if (index($0, v)) { p=1; next } }
              p { print }
            ' CHANGELOG.md > notes.md
          fi
          if [ -s notes.md ]; then
            echo 'have_notes=true' >> "$GITHUB_OUTPUT"
          else
            echo 'have_notes=false' >> "$GITHUB_OUTPUT"
          fi

      # Two mutually-exclusive steps: never pass an empty body_path, which the
      # action treats as a file to read (ENOENT) instead of falling through.
      - name: Create GitHub Release (from CHANGELOG)
        if: steps.check.outputs.released == 'true' && steps.notes.outputs.have_notes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.check.outputs.version }}
          body_path: notes.md

      - name: Create GitHub Release (auto-generated notes)
        if: steps.check.outputs.released == 'true' && steps.notes.outputs.have_notes != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.check.outputs.version }}
          generate_release_notes: true

      # Move the major alias (e.g. v3) to this release, so consumers pinning
      # `uses: BenSheridanEdwards/StyleProof@v3` always get the latest 3.x. A
      # GITHUB_TOKEN push does not retrigger workflows, so this never loops.
      - name: Move the major tag
        if: steps.check.outputs.released == 'true'
        run: |
          MAJOR="v$(echo "${{ steps.check.outputs.version }}" | cut -d. -f1)"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push -f origin "refs/tags/$MAJOR"

  # Mirror the same version to GitHub Packages (scoped) so the repo's Packages
  # section stays in sync. Called here because a GITHUB_TOKEN-created Release does
  # not fire the mirror workflow's own `release` trigger.
  github-packages:
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/github-packages.yml
